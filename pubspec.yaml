name: career_transformation_institute
description: "Career Transformation Institute — landing page & platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # Layout / responsiveness
  responsive_framework: ^1.4.0

  # Icons
  font_awesome_flutter: ^10.7.0

  # Navigation (optional, useful once you add routes/pages beyond the landing page)
  go_router: ^14.2.0

  # Scroll-triggered animations (e.g. AnimatedCounter)
  visibility_detector: ^0.4.0+2

  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/animations/lottie/

